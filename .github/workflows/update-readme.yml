name: Update README Skills Table

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update skills table in README
        run: python .github/scripts/update-skills-table.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet README.md || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update Available Skills table in README"
          git push
